<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#102620">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gastos">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mi Control de Gastos</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Gastos personales</p>
          <h1>Mi dinero</h1>
        </div>
        <button class="icon-button" id="exportBtn" type="button" aria-label="Exportar gastos a CSV" title="Exportar CSV">
          <span aria-hidden="true">↓</span>
        </button>
      </header>

      <section class="balance-panel" aria-label="Resumen del mes">
        <div class="month-row">
          <button class="icon-button ghost" id="prevMonth" type="button" aria-label="Mes anterior">‹</button>
          <strong id="monthLabel"></strong>
          <button class="icon-button ghost" id="nextMonth" type="button" aria-label="Mes siguiente">›</button>
        </div>

        <div class="spent-block">
          <span>Gastado este mes</span>
          <strong id="spentAmount">$0.00</strong>
        </div>

        <div class="budget-card">
          <div>
            <span>Presupuesto mensual</span>
            <strong id="remainingAmount">$0.00 disponible</strong>
          </div>
          <button class="text-button" id="openBudget" type="button">Editar</button>
        </div>

        <div class="progress-track" aria-label="Progreso de presupuesto">
          <div id="budgetProgress" class="progress-fill"></div>
        </div>
        <p id="budgetMessage" class="budget-message"></p>
      </section>

      <section class="quick-form" aria-labelledby="formTitle">
        <h2 id="formTitle">Nuevo gasto</h2>
        <form id="expenseForm">
          <label>
            Monto
            <input id="amountInput" name="amount" type="number" step="0.01" min="0.01" inputmode="decimal" placeholder="0.00" required>
          </label>

          <label>
            Descripción
            <input id="descriptionInput" name="description" type="text" maxlength="48" placeholder="Ej. Almuerzo" required>
          </label>

          <div class="form-grid">
            <label>
              Categoría
              <select id="categoryInput" name="category" required>
                <option>Comida</option>
                <option>Transporte</option>
                <option>Casa</option>
                <option>Salud</option>
                <option>Entretenimiento</option>
                <option>Compras</option>
                <option>Otros</option>
              </select>
            </label>

            <label>
              Fecha
              <input id="dateInput" name="date" type="date" required>
            </label>
          </div>

          <button class="primary-button" type="submit">Guardar gasto</button>
        </form>
      </section>

      <nav class="tabs" aria-label="Vistas">
        <button class="tab active" type="button" data-view="activity">Movimientos</button>
        <button class="tab" type="button" data-view="analytics">Análisis</button>
      </nav>

      <section class="view active" id="activityView" aria-labelledby="activityTitle">
        <div class="section-heading">
          <h2 id="activityTitle">Movimientos</h2>
          <select id="filterCategory" aria-label="Filtrar por categoría">
            <option value="Todas">Todas</option>
            <option>Comida</option>
            <option>Transporte</option>
            <option>Casa</option>
            <option>Salud</option>
            <option>Entretenimiento</option>
            <option>Compras</option>
            <option>Otros</option>
          </select>
        </div>
        <div id="expenseList" class="expense-list"></div>
      </section>

      <section class="view" id="analyticsView" aria-labelledby="analyticsTitle">
        <div class="section-heading">
          <h2 id="analyticsTitle">Análisis</h2>
          <span id="expenseCount" class="muted"></span>
        </div>
        <div id="categoryChart" class="chart-list"></div>
        <div class="insight" id="monthlyInsight"></div>
      </section>
    </main>

    <dialog id="budgetDialog">
      <form method="dialog" id="budgetForm">
        <h2>Presupuesto mensual</h2>
        <label>
          Límite para este mes
          <input id="budgetInput" type="number" step="0.01" min="0" inputmode="decimal" placeholder="0.00">
        </label>
        <div class="dialog-actions">
          <button class="text-button" value="cancel" type="submit">Cancelar</button>
          <button class="primary-button compact" value="save" type="submit">Guardar</button>
        </div>
      </form>
    </dialog>

    <template id="emptyTemplate">
      <div class="empty-state">
        <strong>Aún no hay gastos este mes</strong>
        <span>Agrega el primero para empezar a ver tu ritmo real.</span>
      </div>
    </template>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js");
        });
      }
    </script>
  </body>
</html>
